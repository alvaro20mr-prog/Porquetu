<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Horizontal para Melissa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Tamaño de tarjeta tipo arreglo floral (12cm ancho x 7cm alto) */
        .tarjeta-flores {
            width: 12cm;
            height: 7cm;
            /* Aquí busca la imagen que debes guardar en la misma carpeta */
            background-image: url('flores.png'); 
            background-size: cover;
            background-position: center left;
            border: 1px solid #ccc;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 0.5cm;
            position: relative;
        }
        
        /* Cajita elegante semitransparente para que el QR y el texto se lean perfecto */
        .contenido-derecha {
            background-color: rgba(250, 244, 245, 0.92);
            border: 1px solid #800020;
            border-radius: 6px;
            padding: 0.4cm;
            width: 4.8cm; 
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .para {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2em;
            color: #800020;
            line-height: 1;
            margin-bottom: 5px;
        }

        .qr-img {
            width: 2.8cm;
            height: 2.8cm;
            margin: 0 auto;
            display: block;
            border-radius: 4px;
        }

        .instruccion {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9em;
            color: #333;
            margin-top: 5px;
            font-style: italic;
            line-height: 1.2;
            font-weight: bold;
        }

        .firma {
            font-family: 'Great Vibes', cursive;
            font-size: 1.6em;
            color: #800020;
            margin-top: 2px;
        }

        /* Asegura que al imprimir se vean los fondos y la foto */
        @media print {
            body { background-color: white; align-items: flex-start; justify-content: flex-start; }
            .tarjeta-flores { 
                box-shadow: none; 
                border: 1px dashed #aaa; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
        }
    </style>
</head>
<body>

    <div class="tarjeta-flores">
        <div class="contenido-derecha">
            <h1 class="para">Melissa...</h1>
            <!-- Código QR exacto a tu página con color burdeo -->
            <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://alvaro20mr-prog.github.io/Porquetu/&color=800020&bgcolor=FFFFFF" alt="QR">
            <p class="instruccion">Escanea para tu sorpresa</p>
            <p class="firma">Álvaro</p>
        </div>
    </div>

</body>
</html>
